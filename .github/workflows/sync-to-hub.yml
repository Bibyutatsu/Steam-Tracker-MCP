name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: huggingface/hub-sync@v1.0.1
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: Bibyutatsu/steam-tracker-mcp
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
